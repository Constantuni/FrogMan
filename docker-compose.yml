services:
  postgres-db:
    image: postgres:16-alpine
    container_name: frogman-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SaPassword01
      POSTGRES_DB: FrogManDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: frogman-redis-local
    ports:
      - "6379:6379"

volumes:
  pgdata: